server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Security headers ────────────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Limit referrer info sent to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Force HTTPS for 1 year (enable once HTTPS is confirmed stable)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content Security Policy
    # - Images allowed from self + Linode bucket
    # - Scripts/styles allow inline (Astro static output uses inline scripts)
    # - No external frames, objects, or base-tag overrides
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://adi-web-photos.in-maa-1.linodeobjects.com data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
